name: AI Code Review

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          import json
          import urllib.request

          code = ""

          for root, dirs, files in os.walk("."):
              if ".git" in root:
                  continue

              for file in files:
                  if file.endswith((".py",".js",".ts",".java",".cpp",".c",".html",".css",".json",".yml",".yaml",".md")):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "r", encoding="utf-8") as f:
                              code += f"\n\n### FILE: {path}\n"
                              code += f.read()[:8000]
                      except Exception:
                          pass

          prompt = f"""
          You are an expert software engineer.

          Review this codebase and provide:

          ## Bugs
          ## Security Issues
          ## Performance Improvements
          ## Code Quality Suggestions
          ## Final Score (/10)

          Code:

          {code}
          """

          body = {
              "contents": [
                  {
                      "parts": [
                          {"text": prompt}
                      ]
                  }
              ]
          }

          url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              f"gemini-2.5-flash:generateContent?key={os.environ['GEMINI_API_KEY']}"
          )

          request = urllib.request.Request(
              url,
              data=json.dumps(body).encode(),
              headers={"Content-Type": "application/json"}
          )

          response = urllib.request.urlopen(request)
          result = json.loads(response.read().decode())

          review = result["candidates"][0]["content"]["parts"][0]["text"]

          print(review)

          with open("review.md", "w", encoding="utf-8") as f:
              f.write(review)

          EOF

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `# 🤖 AI Code Review\n\n${body}`
            });
